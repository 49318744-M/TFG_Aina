name: build_and_push_models-2

on:
  workflow_dispatch:

env:
  REPO_NAME: ${{ github.event.repository.name }}
  MONAI_APP_PATH: "${{ github.event.repository.name }}/ai_spleen_seg_app/"
  MONAI_APP_CONFIG: "${{ github.event.repository.name }}/ai_spleen_seg_app/model/app.yml"
  MONAI_MODEL_PATH: "${{ github.event.repository.name }}/ai_spleen_seg_app/model/model.ts"
  EC2_ROLE_NAME: "ec2-role"
  REPOSITORY: "monai"
  TAG: "latest"

jobs:
  setup_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_REGION }}

      - name: Create-EC2 Action Call
        id: create-ec2
        uses: ./.github/actions/create-ec2
        with:
          instance_name: "monai-build"
          key_name: "monai-build-key"
          ec2_role: ${{ env.EC2_ROLE_NAME }}
          aws_region: ${{ secrets.AWS_REGION }}

      - name: Create-EC2 Action Output ID, VM name
        run: |
          echo "Instance ID: $INSTANCE_ID"
          echo "VM Name: $VM_NAME"

      - name: Cloning repository
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "git clone --branch main --depth 1 https://github.com/${{ github.repository }}.git"
      
      - name: Check MONAI platform options
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME \
            "source monai/bin/activate && monai-deploy package --help"

      - name: Package MONAI deploy app
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME << 'EOF'
            source monai/bin/activate
            cd TFG_Aina
            monai-deploy package ai_spleen_seg_app/app.py \
              --config ai_spleen_seg_app/model/app.yml \
              --tag seg_app:latest \
              --models ai_spleen_seg_app/model/model.ts \
              --platform x86_64 \
              -l DEBUG
          EOF

      - name: Login to AWS ECR
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

      - name: Check and create ECR repository if not exists
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "
          if ! aws ecr describe-repositories --region ${{ secrets.AWS_REGION }} --repository-names ${{ env.REPOSITORY }} > /dev/null 2>&1; then
            echo 'Repository ${{ env.REPOSITORY }} does not exist. Creating it...'
            aws ecr create-repository --repository-name ${{ env.REPOSITORY }} --region ${{ secrets.AWS_REGION }}
          else
            echo 'Repository ${{ env.REPOSITORY }} already exists.'
          fi
          "
      - name: List Docker images
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "docker images"

      - name: Tag Docker Image
        run: |
          DOCKER_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.REPOSITORY }}:${{ env.TAG }}"
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "docker tag seg_app-x86_64-workstation-dgpu-linux-amd64:latest $DOCKER_IMAGE"
          echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV

      - name: Push Docker Image
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "docker push $DOCKER_IMAGE"

      - name: Terminate EC2 Instance
        if: always()
        run: |
          aws ec2 terminate-instances --instance-ids $INSTANCE_ID --region ${{ secrets.AWS_REGION }}
          aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID --region ${{ secrets.AWS_REGION }}