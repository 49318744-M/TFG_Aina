name: build_and_push_models-2

on:
  workflow_dispatch:

env:
  REPO_NAME: ${{ github.event.repository.name }}
  EC2_ROLE_NAME: "ec2-role"
  REPOSITORY: "monai"
  TAG: "latest"

jobs:
  setup_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region ${{ secrets.AWS_REGION }} 

      - name: Create-EC2 Action Call
        id: create-ec2
        uses: ./.github/actions/create-ec2
        with:
          instance_name: "monai-build"
          key_name: "monai-build-key"
          ec2_role: ${{ env.EC2_ROLE_NAME }}
          aws_region: ${{ secrets.AWS_REGION }}

      - name: Setup SSH Key
        run: |
          # Use the temporary key generated by the action if available, or the secret
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          echo "SSH_PRIVATE_KEY_PATH=$(pwd)/private_key.pem" >> $GITHUB_ENV

      - name: Cloning repository on EC2
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "
            rm -rf ${{ env.REPO_NAME }}
            git clone --branch main --depth 1 https://github.com/${{ github.repository }}.git
            cd ${{ env.REPO_NAME }}
            # CRÍTIC: Descarregar els fitxers reals de LFS (el model.ts)
            git lfs pull
          "

      - name: Package MONAI deploy app
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME << 'EOF'
            source /home/ubuntu/monai/bin/activate
            cd /home/ubuntu/${{ env.REPO_NAME }}
            
            export HOLOSCAN_SDK_VERSION=4.0.0

            # Executem el package i guardem el log per si falla
            monai-deploy package ai_spleen_seg_app/app.py \
              --config ai_spleen_seg_app/model/app.yml \
              --tag seg_app:latest \
              --models ai_spleen_seg_app/model/model.ts \
              --platform x64-workstation \
              -l DEBUG
          EOF

      - name: Login to AWS ECR
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

      - name: Check and create ECR repository
        run: |
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "aws ecr describe-repositories --repository-names ${{ env.REPOSITORY }} || aws ecr create-repository --repository-name ${{ env.REPOSITORY }}" 

      - name: Tag and Push Docker Image
        run: |
          DOCKER_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.REPOSITORY }}:${{ env.TAG }}"
          ssh -i $SSH_PRIVATE_KEY_PATH -o StrictHostKeyChecking=no $VM_NAME "
            echo '--- LLISTAT D IMATGES DISPONIBLES ---'
            docker images
            
            # Busquem qualsevol imatge que no sigui buildkit per ID
            IMAGE_ID=\$(docker images --format '{{.ID}} {{.Repository}}' | grep -v 'moby/buildkit' | head -n 1 | awk '{print \$1}')
            
            if [ -z \"\$IMAGE_ID\" ]; then
              echo 'ERROR: No s'ha generat cap imatge!'
              exit 1
            fi

            docker tag \$IMAGE_ID $DOCKER_IMAGE
            docker push $DOCKER_IMAGE
          "

      - name: Terminate EC2 Instance
        if: always() # S'executa encara que el build falli per no gastar diners
        run: |
          aws ec2 terminate-instances --instance-ids $INSTANCE_ID --region ${{ secrets.AWS_REGION }}